spring:
  application:
    name: regenera-map-backend
  # Perfil activo: 'dev' por defecto, sobreescribible con SPRING_PROFILES_ACTIVE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway gestiona el esquema; Hibernate solo valida que coincide
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  # Todos los endpoints cuelgan de /api (el proxy nginx redirige /api → :8080)
  servlet:
    context-path: /api

# Actuator: health e info expuestos (health check para Docker/Azure)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# Springdoc / Swagger UI → disponible en /api/docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
