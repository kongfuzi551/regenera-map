# Perfil de producción (Azure Container Apps + Supabase PostgreSQL)
# Todos los valores se inyectan vía variables de entorno; sin defaults.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
